version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       smart_apply
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL:    postgresql://postgres:postgres@db:5432/smart_apply
      SECRET_KEY:      ${SECRET_KEY:-dev-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GMAIL_CLIENT_ID:     ${GMAIL_CLIENT_ID}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET}
      GMAIL_REDIRECT_URI:  ${GMAIL_REDIRECT_URI:-http://localhost:5000/email/callback}
      FRONTEND_URL:        ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
